services:
  postgres:
    image: postgres:16
    container_name: iot-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iot_db

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - ./data:/data
  mqtt:
    image: eclipse-mosquitto
    container_name: iot-mqtt
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt-data:/mosquitto/data
  kafka:
    image: apache/kafka:3.9.0
    container_name: iot-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://iot-kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@iot-kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    volumes:
      - kafka-data:/var/lib/kafka/data

  data-ingestion:
    build:
      context: ./services/data-ingestion
      dockerfile: Dockerfile
    container_name: iot-ingestion
    restart: always
    depends_on:
      - mqtt
      - kafka
    environment:
      MQTT_BROKER: mqtt://iot-mqtt:1883
      KAFKA_BROKER: iot-kafka:9092
  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    container_name: iot-analytics
    restart: always
    depends_on:
      - mqtt
      - kafka
    environment:
      MQTT_BROKER: mqtt://iot-mqtt:1883
      KAFKA_BROKER: iot-kafka:9092
  data-storage:
    build:
      context: ./services/data-storage
      dockerfile: Dockerfile
    container_name: iot-storage
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      Broker__Mode: mqtt
      Broker__Mqtt__Host: iot-mqtt
      Broker__Mqtt__Port: "1883"
      Broker__Mqtt__Topic: iot/sensors
      Broker__Mqtt__QoS: "1"
      Database__ConnectionString: "Host=iot-postgres;Port=5432;Database=iot_db;Username=postgres;Password=postgres"
      Batching__BatchSize: "500"
      Batching__FlushIntervalSeconds: "5"
    
volumes:
  postgres-data:
  mqtt-data:
  kafka-data: